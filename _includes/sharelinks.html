{% assign share_url = page.url | absolute_url %}
{% assign safe_url = share_url | url_encode %}
{% assign safe_title = page.title | url_encode %}
<div class="share-buttons" data-share-url="{{ share_url }}" data-share-title="{{ page.title | escape }}">
  <span>Share:</span>
  <button class="share-button share-button--native" type="button">Share or copy link</button>
  <a class="share-button" href="https://www.linkedin.com/sharing/share-offsite/?url={{ safe_url }}" target="_blank" rel="noopener">LinkedIn</a>
  <a class="share-button" href="mailto:?subject={{ safe_title }}&amp;body={{ safe_url }}">Email</a>
  <span class="share-status" role="status" aria-live="polite"></span>
</div>
