<nav class="post_navi" aria-label="Article navigation">
  {% if page.previous.url %}
    <a class="post_navi-item nav_prev" href="{{ page.previous.url | relative_url }}" title="{{ page.previous.title | escape }}">
      <div class="post_navi-arrow" aria-hidden="true">‹</div><div class="post_navi-label">Previous</div><div><span>{{ page.previous.title }}</span></div>
    </a>
  {% else %}
    <a class="post_navi-item nav_prev" href="{{ '/litreview/' | relative_url }}">
      <div class="post_navi-arrow" aria-hidden="true">‹</div><div class="post_navi-label">Publication library</div><div><span>Browse all articles</span></div>
    </a>
  {% endif %}
  {% if page.next.url %}
    <a class="post_navi-item nav_next" href="{{ page.next.url | relative_url }}" title="{{ page.next.title | escape }}">
      <div class="post_navi-arrow" aria-hidden="true">›</div><div class="post_navi-label">Next</div><div><span>{{ page.next.title }}</span></div>
    </a>
  {% else %}
    <a class="post_navi-item nav_next" href="{{ '/litreview/' | relative_url }}">
      <div class="post_navi-arrow" aria-hidden="true">›</div><div class="post_navi-label">Publication library</div><div><span>Browse all articles</span></div>
    </a>
  {% endif %}
</nav>
