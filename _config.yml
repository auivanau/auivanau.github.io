title: "The Lab"
author: "Ivan Au, MD, P.Eng"
description: "High-signal radiation oncology literature surveillance, clinical horizon scanning, and practical analysis at the intersection of medicine, engineering, and AI."
url: "https://auivanau.github.io"
baseurl: ""
timezone: "America/Edmonton"
lang: "en-CA"

# Public profile links used by the Minima theme and SEO metadata.
github_username: "auivanau"

# Add the public signup URL from your newsletter provider when ready.
# Example: https://buttondown.com/your-publication
newsletter_url: ""
newsletter_name: "The Lab Dispatch"

# Default social preview image when a page does not define a thumbnail.
default_social_image: "/assets/litreview-radonc-digest.png"

# Theme and plugins supported by GitHub Pages.
theme: minima
rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  phantom:
    output: true
    permalink: /phantom/:name/
  oilsands:
    output: true
    permalink: /oilsands/:name/
  litreview:
    output: true
    permalink: /litreview/:year/:month/:day/:title/

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      author: "Ivan Au, MD, P.Eng"
  - scope:
      path: ""
      type: litreview
    values:
      layout: post
  - scope:
      path: ""
      type: phantom
    values:
      layout: post
  - scope:
      path: ""
      type: oilsands
    values:
      layout: post

header_pages:
  - index.md
  - radonc-weekly.md
  - clinical-horizon-scan.md
  - litreview.md
  - projects.md
  - about.md
